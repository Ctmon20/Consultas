<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal de Consultas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ajustes para garantir que nada ultrapasse a largura da tela */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            overflow-x: hidden; 
            background: #f4f6f9; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            /* Ajuste para o topo do celular */
            padding-top: env(safe-area-inset-top, 0px); 
        }
        .navbar { 
            background: #0d6efd; 
            color: white; 
            padding: 20px 15px 15px 15px; /* Aumentei o padding superior de 15 para 20 */
            width: 100%; 
        }
        .content { padding: 20px; max-width: 100%; margin: auto; flex: 1; box-sizing: border-box; }
        .section { display: none; }
        .section.active { display: block; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-top: 15px; padding: 15px; word-wrap: break-word; }
        .label { font-weight: bold; color: #0d6efd; }
        .footer { padding: 20px; text-align: center; background: #fff; border-top: 1px solid #ddd; margin-top: 20px; width: 100%; overflow: hidden; }
        
        /* Splash Screen Fixa */
        /* Splash Screen configurada para ocupar 100% da tela */
        .splash {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #ffffff; /* Fundo branco ou a cor predominante da sua imagem */
            display: flex; 
            justify-content: center;
            align-items: center; 
            z-index: 9999; 
            transition: opacity 0.5s ease;
            flex-direction: column;
        }

        .splash img {
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; /* Garante que a imagem não distorça */
        }
    </style>
</head>
<body>

<div class="splash" id="splash">
    <img src="tela.png" alt="Tela Inicial">
</div>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand">Portal de Consultas</a>
        <select class="form-select w-auto" onchange="showSection(this.value)">
            <option value="cep">Consulta CEP</option>
            <option value="cnpj">Consulta CNPJ</option>
            <option value="fipe">Consulta FIPE</option>
            <option value="bancos">Bancos</option>
        </select>
    </div>
</nav>

<div class="content">
    <div id="cep" class="section active">
        <h2>Consulta CEP</h2>
        <input id="cepInput" class="form-control" placeholder="00000000">
        <button class="btn btn-primary mt-2" onclick="consultarCEP()">Buscar CEP</button>
        <div id="cepRes"></div>
    </div>

    <div id="cnpj" class="section">
        <h2>Consulta CNPJ</h2>
        <input id="cnpjInput" class="form-control" placeholder="00000000000000">
        <button class="btn btn-success mt-2" onclick="consultarCNPJ()">Buscar CNPJ</button>
        <div id="cnpjRes"></div>
    </div>

    <div id="fipe" class="section">
        <h2>Consulta FIPE</h2>
        <select id="tipoFipe" class="form-control mb-2"><option value="carros">Carros</option><option value="motos">Motos</option><option value="caminhoes">Caminhões</option></select>
        <button class="btn btn-primary" onclick="carregarMarcas()">1. Carregar Marcas</button>
        <select id="marcaFipe" class="form-control mt-2"></select>
        <button class="btn btn-primary mt-2" onclick="carregarModelos()">2. Carregar Modelos</button>
        <select id="modeloFipe" class="form-control mt-2"></select>
        <button class="btn btn-primary mt-2" onclick="carregarAnos()">3. Carregar Anos</button>
        <select id="anoFipe" class="form-control mt-2"></select>
        <button class="btn btn-dark mt-2" onclick="consultarFipe()">Consultar Valor</button>
        <div id="fipeRes"></div>
    </div>

    <div id="bancos" class="section">
        <h2>Lista de Bancos</h2>
        <button class="btn btn-dark" onclick="listarBancos()">Carregar Bancos</button>
        <div id="bancosRes"></div>
    </div>
</div>

<footer class="footer" id="ads-container"></footer>

<script>
    setTimeout(() => {
        const splash = document.getElementById('splash');
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 500);
    }, 7000);

    function showSection(id) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function consultarCEP() {
        const cep = document.getElementById('cepInput').value.replace(/\D/g, '');
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const d = await res.json();
        
        const resDiv = document.getElementById('cepRes');
        
        // Verifica se a API retornou erro
        if (d.erro) {
            resDiv.innerHTML = `<div class="card" style="color: red; font-weight: bold;">CEP não encontrado! Verifique o número.</div>`;
            return;
        }

        // Se deu certo, exibe os dados
        const obj = { 'CEP': d.cep, 'LOGRADOURO': d.logradouro, 'BAIRRO': d.bairro, 'CIDADE': d.localidade, 'UF': d.uf };
        resDiv.innerHTML = `<div class="card">${Object.entries(obj).map(([k,v])=>`<div><span class="label">${k}:</span> ${v||'Não informado'}</div>`).join('')}</div>`;
    }

    async function consultarCNPJ() {
        const cnpj = document.getElementById('cnpjInput').value.replace(/\D/g, '');
        const resDiv = document.getElementById('cnpjRes');

        if (cnpj.length !== 14) {
            resDiv.innerHTML = `<div class="card" style="color: orange; font-weight: bold;">CNPJ deve conter 14 dígitos.</div>`;
            return;
        }

        try {
            const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
            
            // Verifica se a resposta foi bem sucedida
            if (!res.ok) {
                resDiv.innerHTML = `<div class="card" style="color: red; font-weight: bold;">CNPJ não encontrado ou erro na consulta!</div>`;
                return;
            }

            const d = await res.json();
            const obj = { 
                'RAZÃO SOCIAL': d.razao_social, 
                'UF': d.uf, 
                'CEP': d.cep, 
                'LOGRADOURO': d.logradouro, 
                'MUNICÍPIO': d.municipio, 
                'ATIVIDADE': d.cnae_fiscal_descricao 
            };
            
            resDiv.innerHTML = `<div class="card">${Object.entries(obj).map(([k,v])=>`<div><span class="label">${k}:</span> ${v||'Não informado'}</div>`).join('')}</div>`;
            
        } catch (error) {
            resDiv.innerHTML = `<div class="card" style="color: red; font-weight: bold;">Erro ao conectar com o servidor. Tente novamente.</div>`;
        }
    }

    async function carregarMarcas() {
        const tipo = document.getElementById("tipoFipe").value;
        const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/marcas`);
        const d = await res.json();
        document.getElementById("marcaFipe").innerHTML = d.map(m => `<option value="${m.codigo}">${m.nome}</option>`).join('');
    }

    async function carregarModelos() {
        const tipo = document.getElementById("tipoFipe").value;
        const m = document.getElementById("marcaFipe").value;
        const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/marcas/${m}/modelos`);
        const d = await res.json();
        document.getElementById("modeloFipe").innerHTML = d.modelos.map(m => `<option value="${m.codigo}">${m.nome}</option>`).join('');
    }

    async function carregarAnos() {
        const tipo = document.getElementById("tipoFipe").value;
        const m = document.getElementById("marcaFipe").value;
        const mod = document.getElementById("modeloFipe").value;
        const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/marcas/${m}/modelos/${mod}/anos`);
        const d = await res.json();
        document.getElementById("anoFipe").innerHTML = d.map(a => `<option value="${a.codigo}">${a.nome}</option>`).join('');
    }

    async function consultarFipe() {
        const tipo = document.getElementById("tipoFipe").value;
        const m = document.getElementById("marcaFipe").value;
        const mod = document.getElementById("modeloFipe").value;
        const ano = document.getElementById("anoFipe").value;
        const res = await fetch(`https://parallelum.com.br/fipe/api/v1/${tipo}/marcas/${m}/modelos/${mod}/anos/${ano}`);
        const d = await res.json();
        document.getElementById("fipeRes").innerHTML = `<div class="card"><h4>${d.Marca} ${d.Modelo}</h4><p><b>Ano:</b> ${d.AnoModelo}<br><b>Valor:</b> ${d.Valor}<br><b>Combustível:</b> ${d.Combustivel}</p></div>`;
    }

    async function listarBancos() {
        const res = await fetch('https://brasilapi.com.br/api/banks/v1');
        const d = await res.json();
        document.getElementById("bancosRes").innerHTML = `<div class="card"><ul>${d.slice(0, 20).map(b=>`<li>${b.code || '-'} - ${b.name}</li>`).join('')}</ul></div>`;
    }

    function loadAds() {
        const container = document.getElementById('ads-container');
        container.innerHTML = '';
        const atOptions = { 'key' : '5069ad86b9e8e9fde3e56a361568f7fd', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        const configScript = document.createElement('script');
        configScript.text = `atOptions = ${JSON.stringify(atOptions)};`;
        container.appendChild(configScript);
        const invokeScript = document.createElement('script');
        invokeScript.src = 'https://www.highperformanceformat.com/5069ad86b9e8e9fde3e56a361568f7fd/invoke.js';
        container.appendChild(invokeScript);
    }
    loadAds();
    setInterval(loadAds, 60000);
</script>
</body>
</html>
